<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorial White - Synthetic Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Helvetica+Neue:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #ffffff; color: #000000; overflow-x: hidden; }
    .serif { font-family: 'Playfair Display', serif; }
    
    .magazine-title {
      font-size: clamp(5rem, 12vw, 15rem);
      line-height: 0.8;
      letter-spacing: -0.05em;
    }
  </style>
</head>
<body class="antialiased p-4 md:p-12">

  <div class="border-[4px] border-black min-h-[90vh] flex flex-col relative">

    <nav class="flex justify-between items-start p-8 border-b-2 border-black">
      <div class="text-xl font-bold uppercase tracking-widest">Synthetix /</div>
      <div class="text-sm font-medium uppercase tracking-widest max-w-xs text-right">
        Volume IV.<br>
        The Art of Generative Data.
      </div>
    </nav>

    <main class="flex-grow flex flex-col justify-between p-8 relative overflow-hidden">
      
      <div class="w-full flex justify-end mb-20 relative z-10">
        <p class="text-lg md:text-2xl font-medium max-w-md leading-tight text-right uppercase border-r-4 border-black pr-6">
          Absolute privacy. Infinite scale. The new paradigm in machine learning datasets.
        </p>
      </div>

      <div class="relative z-10">
        <h1 class="magazine-title font-bold uppercase">
          Synthetic
        </h1>
        <h1 class="magazine-title serif italic -mt-6 md:-mt-12 text-gray-500">
          Generation.
        </h1>
      </div>

      <!-- Abstract imagery (pure grayscale) -->
      <div class="absolute right-0 bottom-0 w-1/2 h-2/3 z-0 pointer-events-none opacity-20 filter grayscale contrast-150">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2400&auto=format&fit=crop" class="w-full h-full object-cover" alt="Abstract">
      </div>
    </main>

    <footer class="grid grid-cols-2 md:grid-cols-4 border-t-2 border-black">
      <div class="p-6 border-r-2 border-black border-b-2 md:border-b-0 uppercase font-bold text-sm flex items-center justify-center hover:bg-black hover:text-white transition cursor-pointer">Explore</div>
      <div class="p-6 border-r-0 md:border-r-2 border-black border-b-2 md:border-b-0 uppercase font-bold text-sm flex items-center justify-center hover:bg-black hover:text-white transition cursor-pointer">Method</div>
      <div class="p-6 border-r-2 border-black uppercase font-bold text-sm flex items-center justify-center hover:bg-black hover:text-white transition cursor-pointer">Whitepaper</div>
      <div class="p-6 bg-black text-white uppercase font-bold text-sm flex items-center justify-center cursor-pointer">Execute &rarr;</div>
    </footer>

  </div>

</body>
</html>
